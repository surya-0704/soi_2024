<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Bother scrolling</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        background-color: #f0f0f0;
    }

    .input-container {
        margin-top: 20px;
        margin-bottom: 10px;
    }

    .barcode-text {
        font-size: 20px;
        font-family: Arial, sans-serif;
        letter-spacing: 0;
        line-height: 10px; /* Adjust line height for vertical stretch */
        transform-origin: top left;
        transform: scaleX(1) scaleY(1000);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%; /* Ensure the div takes up full height of its parent */
        padding-top: 0px;
        user-select: none; /* Make the text unselectable */
    }

    button {
        margin-top: 10px;
    }
</style>
</head>
<body>
<h1> Don't bother scrolling </h1>
<h4> Seriously, don't bother scrolling </h3>
<div class="input-container">
    <label for="scaleX">A mathematician's love:</label>
    <input type="number" id="scaleX">
</div>
<div class="input-container">
    <label for="scaleY">...is for two:</label>
    <input type="number" id="scaleY">
</div>
<button onclick="applyTransform()">SQUISH</button>
